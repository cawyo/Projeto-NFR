<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="loginStyle.css">
</head>
<body>
    <div class="login-container" style="margin: 10%;">
        <h2>Bem-vindo</h2>
        <form id="login-form">
            <input class="login-input" type="text" placeholder="Nome de usuário" required id ="username">
            <input class="login-input" type="password" placeholder="Senha" required id="password">
            <button class="login-btn" type="submit">Entrar</button>
        </form>
        <div class="login-links">
            <p>Não tem uma conta? <a href="#" id="signup-link">Registre-se</a></p>
            <p><a href="#" id="forgot-password-link">Esqueceu a senha?</a></p>
        </div>
    </div>

    <div class="login-container" id="signup-container" style="display: none;">
        <h2>Cadastre-se</h2>
        <form id="signup-form">
            <input class="login-input" type="text" placeholder="Nome de usuário" required id="username">
            <input class="login-input" type="email" placeholder="Email" required id="email">
            <input class="login-input" type="password" placeholder="Senha" required id="password">
            <button class="login-btn" type="submit">Cadastrar</button>
        </form>
        <div class="login-links">
            <p>Já tem uma conta? <a href="#" id="login-link">Faça login</a></p>
        </div>
    </div>

    <script src="telaLogin.js">

    </script>
</body>
